<div class="card-bloc">
    
    <h2>Servește primul pahar</h2>
    <div class="separator"></div>
    <p>Un butoi, un pahar și momentul acela satisfăcător când începe să curgă berea. <b> Restul e atmosferă Heineken.</b></p>

    <div class="svg-wrap">
        <svg width="100%" viewBox="0 0 680 720" role="img"> <!-- viewBox defineste sistemul intern de coordonate, x si y min=0 (stanga sus), si latimea si ialtimea  -->
            <title>Heineken keg animation</title>
            <desc>Butoi Heineken cu robinet din care curge bere intr-un pahar pe un blat de lemn</desc>

            <defs>
                <!-- https://www.w3schools.com/graphics/svg_grad_linear.asp -->
                <linearGradient id="metalBarrel" x1="0%" y1="0%" x2="100%" y2="0%">  <!--x1, x2, y1, y2 directia gradientului, incepe din partea stg spre dr, pe aceeasi linie orizontala, la stg am prima culoare si tot se schimba-->
                    <stop offset="0%" stop-color="#555"/> <!-- la pozitia.. este culoarea ..-->
                    <stop offset="25%" stop-color="#aaa"/>
                    <stop offset="50%" stop-color="#ddd"/>
                    <stop offset="75%" stop-color="#aaa"/>
                    <stop offset="100%" stop-color="#555"/>
                </linearGradient>
                <linearGradient id="metalCap" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#d0d0d0"/>
                    <stop offset="100%" stop-color="#888"/>
                </linearGradient>
                <linearGradient id="beerG" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#f8cc3c"/>
                    <stop offset="100%" stop-color="#c88010"/>
                </linearGradient>
                <linearGradient id="glassG" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
                    <stop offset="45%" stop-color="rgba(200,230,255,0.06)"/>
                    <stop offset="90%" stop-color="rgba(255,255,255,0.45)"/>
                </linearGradient>
                <!-- gradient pentru suprafata de sus a blatului -->
                <linearGradient id="woodTop" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#c8874a"/>
                    <stop offset="18%" stop-color="#b07535"/>
                    <stop offset="100%" stop-color="#7a4518"/>
                </linearGradient>
                <!-- gradient pentru fata blatului, efect 3D -->
                <linearGradient id="woodFront" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#8b5a28"/>
                    <stop offset="100%" stop-color="#5c3510"/>
                </linearGradient>
                <!-- gradient pentru jetul de bere, mai realist -->
                <linearGradient id="beerStream" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#d4a020" stop-opacity="0.6"/>
                    <stop offset="40%" stop-color="#f8cc3c" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#d4a020" stop-opacity="0.6"/>
                </linearGradient>
                <!-- decupaj folosit la pahar sa fac berea doar in pahar-->
                <clipPath id="glassClip">
                    <polygon points="10,0 90,0 80,145 20,145"/>
                </clipPath>
            </defs>

            <!-- x si y pozitia colutului stanga sus si celalte logic -->
            <rect x="215" y="90" width="250" height="280" rx="8" fill="url(#metalBarrel)"/>
            <ellipse cx="340" cy="90" rx="125" ry="28" fill="url(#metalCap)"/> <!--capacul de sus -->
            <ellipse cx="340" cy="370" rx="125" ry="26" fill="#999"/> <!-- capacul de jos -->
            <ellipse cx="340" cy="370" rx="108" ry="19" fill="#bbb" opacity="0.35"/>

            <!-- https://www.w3schools.com/graphics/svg_path.asp -->
            <!-- M de la move to, A de la arc 123, 25 sunt razele, stroke culoarea conturului-->
            <!-- pentru fiecare linie am linia din spate mai groasa si mai intunecat, si linea de deasupra aia cu gri deschis -->
            <path d="M 217,138 A 123,25 0 0 1 463,138" fill="none" stroke="#444" stroke-width="11"/>
            <path d="M 217,138 A 123,25 0 0 1 463,138" fill="none" stroke="#e8e8e8" stroke-width="5" opacity="0.75"/>

            <path d="M 215,230 A 125,28 0 0 1 465,230" fill="none" stroke="#444" stroke-width="13"/>
            <path d="M 215,230 A 125,28 0 0 1 465,230" fill="none" stroke="#e8e8e8" stroke-width="6" opacity="0.75"/>

            <path d="M 217,322 A 123,25 0 0 1 463,322" fill="none" stroke="#444" stroke-width="11"/>
            <path d="M 217,322 A 123,25 0 0 1 463,322" fill="none" stroke="#e8e8e8" stroke-width="5" opacity="0.75"/>

            <ellipse cx="340" cy="230" rx="85" ry="55" fill="#005c2a"/>  <!-- eticheta verde exterior -->
            <ellipse cx="340" cy="230" rx="80" ry="50" fill="#006c35"/>  <!-- eticheta verde interior -->
            <polygon
                points="340,200 348,220 370,220 353,233 360,254 340,241 320,254 327,233 310,220 332,220"
                fill="#cc0000" stroke="#aa0000" stroke-width="1"/>
            <text x="340" y="268" font-size="13" fill="white" font-weight="bold" font-family="Georgia,serif"
                text-anchor="middle" letter-spacing="2">HEINEKEN</text>

            <!-- robinet -->
            <rect x="322" y="365" width="36" height="22" rx="6" fill="#aaa"/> <!-- primul ala gri -->
            <rect x="330" y="385" width="20" height="48" rx="6" fill="#bbb"/> <!-- aia in jos lunga -->
            <rect x="304" y="374" width="72" height="11" rx="5" fill="#cc2200"/> <!-- robinet rosu -->
            <ellipse cx="340" cy="433" rx="9" ry="5" fill="#999"/>

            <!-- animatie bere care curgec -->
            <rect x="336" y="433" width="8" height="0" rx="3" fill="url(#beerStream)">
                <animate attributeName="height" from="0" to="50" dur="0.3s" begin="0.5s" fill="freeze"/> <!-- curge bere in jos -->
                <animate attributeName="height" from="50" to="0" dur="0.15s" begin="5.2s" fill="freeze"/>
            </rect>

            <!-- g vine de la grup, si cu translate, adica tot ce desenz in interior foloseste coordonate locale-->
            <g transform="translate(295, 480)">
                <!--  Q e o curba cu pct de control si pct final , pct de control gen curba vine spre el   stroke-linecap capetele rotunjite -->
                <!-- toarta -->
                <path d="M 80,22 Q 112,22 112,62 Q 112,102 78,102" fill="none" stroke="#c8c8c8" stroke-width="11"
                    stroke-linecap="round"/>
                <path d="M 80,22 Q 104,22 104,62 Q 104,96 78,96" fill="none" stroke="rgba(255,255,255,0.35)"
                    stroke-width="4" stroke-linecap="round"/>

                <!-- aplic decupajul sa nu iasa elementele din dreptunghi-->
                <g clip-path="url(#glassClip)">
                    <!-- berea din pahar care creste, schimb si Y sa nu creasca berea in jos :))-->
                    <rect x="10" y="145" width="80" height="0" fill="url(#beerG)">
                        <animate attributeName="height" from="0" to="136" dur="3.5s" begin="0.7s" fill="freeze"/>
                        <animate attributeName="y" from="145" to="9" dur="3.5s" begin="0.7s" fill="freeze"/>
                    </rect>

                    <!-- bule schimba coord verticale de la 138 la sus -->
                    <circle cx="28" cy="130" r="2.5" fill="rgba(255,220,60,0.75)" opacity="0">
                        <animate attributeName="cy" values="138;12" dur="2.1s" begin="2s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0;0.75;0" dur="2.1s" begin="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="50" cy="125" r="1.8" fill="rgba(255,220,60,0.6)" opacity="0">
                        <animate attributeName="cy" values="138;22" dur="1.7s" begin="2.5s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0;0.6;0" dur="1.7s" begin="2.5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="68" cy="130" r="2" fill="rgba(255,220,60,0.55)" opacity="0">
                        <animate attributeName="cy" values="138;35" dur="2.4s" begin="2.9s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0;0.55;0" dur="2.4s" begin="2.9s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="38" cy="128" r="1.4" fill="rgba(255,220,60,0.5)" opacity="0">
                        <animate attributeName="cy" values="138;50" dur="1.9s" begin="3.2s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0;0.5;0" dur="1.9s" begin="3.2s" repeatCount="indefinite"/>
                    </circle>

                    <!-- spuma  -->
                    <g opacity="0">
                        <ellipse cx="45" cy="10" rx="38" ry="12" fill="white"/>
                        <ellipse cx="20" cy="5" rx="17" ry="10" fill="white"/>
                        <ellipse cx="46" cy="2" rx="19" ry="9" fill="white"/>
                        <ellipse cx="70" cy="6" rx="15" ry="9" fill="white"/>
                        <ellipse cx="30" cy="1" rx="12" ry="7" fill="rgba(255,255,255,0.85)"/>
                        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.0s" fill="freeze"/>
                    </g>
                </g>

                <polygon points="10,0 90,0 80,145 20,145" fill="url(#glassG)" stroke="rgba(160,210,255,0.6)"
                    stroke-width="2"/>
                <rect x="10" y="0" width="80" height="7" rx="2" fill="rgba(255,255,255,0.5)"/>
                <rect x="20" y="141" width="60" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
                <!-- reflexie laterala stanga -->
                <rect x="14" y="8" width="7" height="110" rx="3" fill="rgba(255,255,255,0.18)"/>
            </g>

            
            <!-- fata blatului  -->
            <rect x="55" y="648" width="570" height="14" fill="url(#woodFront)"/>
            <!-- suprafata de sus -->
            <rect x="55" y="634" width="570" height="16" rx="4" fill="url(#woodTop)"/>
            <!-- fire de lemn -->
            <line x1="55" y1="638" x2="625" y2="638" stroke="#c07030" stroke-width="0.8" opacity="0.45"/>
            <line x1="55" y1="641" x2="625" y2="641" stroke="#a05820" stroke-width="0.5" opacity="0.3"/>
            <line x1="55" y1="644" x2="625" y2="644" stroke="#c07030" stroke-width="0.8" opacity="0.4"/>
            <line x1="55" y1="647" x2="625" y2="647" stroke="#a05820" stroke-width="0.6" opacity="0.35"/>
            <!-- nod lemn -->
            <ellipse cx="180" cy="641" rx="22" ry="5" fill="none" stroke="#8a4a18" stroke-width="0.8" opacity="0.4"/>
            <ellipse cx="180" cy="641" rx="12" ry="3" fill="none" stroke="#7a3a10" stroke-width="0.7" opacity="0.35"/>
            <!-- margine luminoasa sus -->
            <rect x="55" y="634" width="570" height="2" rx="2" fill="rgba(220,160,80,0.5)"/>
            <!-- umbra blat jos -->
            <rect x="60" y="661" width="560" height="5" rx="2" fill="rgba(0,0,0,0.35)"/>
        </svg>
    </div>
</div>
