<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="utf-8" />
    <title>Heineken</title>
    <link rel="stylesheet" href="css/stil.css">
    <!-- rel- tipul de relatie, practic ii spune browserului ca urmatorul fisier e css -->
    <script>
        function schimbaContinut(resursa, jsFisier, jsFunctie) {
            fetch(resursa + ".html")
                .then(function (raspuns) {
                    return raspuns.text();
                })
                .then(function (text) {
                    document.getElementById("continut").innerHTML = text;

                    if (jsFisier) {
                        // verificam daca scriptul e deja incarcat
                        var scriptExistent = document.querySelector('script[src="' + jsFisier + '"]');
                        if (!scriptExistent) {
                            var elementScript = document.createElement("script");
                            elementScript.onload = function() {
                                if (jsFunctie) window[jsFunctie]();
                            };
                            elementScript.src = jsFisier;
                            document.head.appendChild(elementScript);
                        } else {
                            if (jsFunctie) window[jsFunctie]();
                        }
                    }
                })
                .catch(function (eroare) {
                    document.getElementById("continut").innerHTML = "<p>Eroare la încărcarea paginii.</p>";
                    console.error(eroare);
                });
        }
    </script>
</head>

<body onload="schimbaContinut('acasa')">

    <header>
        <nav>
            <a onclick="schimbaContinut('acasa')" class="nav-activ">Acasă</a>
            <a onclick="schimbaContinut('despre_heineken')">Despre</a>
            <a onclick="schimbaContinut('inregistreaza', 'js/script.js', null)">Formular</a>
            <a onclick="schimbaContinut('video')">Video</a>
            <a onclick="schimbaContinut('desen')">Desen</a>
            <a onclick="schimbaContinut('invat', 'js/script.js', 'initPagina')" style="cursor:pointer">Învăț</a>
            <a onclick="schimbaContinut('persoane', 'js/persoane.js', 'incarcaPersoane')">Persoane</a>
            <a onclick="schimbaContinut('verifica', 'js/script.js', null)">Verifică</a>
            <a onclick="schimbaContinut('cumparaturi', 'js/cumparaturi.js', null)" style="cursor:pointer">Cumpărături</a>
        </nav>

        <div class="hero-header">
            <h1>Heineken</h1>
            <p class="hero-sub">Bere premium. Pasiune autentică. Din 1873.</p>
        </div>
    </header>

    <section id="continut">
    </section>

    <footer>
        <hr>
        &copy; Heineken
    </footer>

</body>

</html>
