<div class="card-bloc">
    <div class="bloc-label">Înregistrare</div>
    <h2>Intră în contul tău</h2>
    <div class="separator"></div>

    <div class="form-stilizat">
        <div class="form-group">
            <label for="v-user">Nume utilizator</label>
            <input type="text" id="v-user" placeholder="utilizator">
        </div>
        <div class="form-group">
            <label for="v-parola">Parolă</label>
            <input type="password" id="v-parola" placeholder="••••••••">
        </div>
        <button class="btn-submit" onclick="verificaUtilizator()">Conectare</button>
        <p id="rezultat-verificare"></p>
    </div>
</div>
